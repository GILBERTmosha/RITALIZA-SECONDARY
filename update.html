<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritaliza School Updates</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 15px; }
  .container { max-width: 800px; margin: auto; }
  .header { text-align: center; color: #003366; margin-bottom: 30px; }
  
  .card { background: white; margin-bottom: 25px; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border-left: 6px solid #003366; }
  .news-card { background: #fffbe6; border-left-color: #ffcc00; padding: 20px; }
  
  .caption { padding: 15px; font-weight: bold; color: #003366; font-size: 18px; }
  .time { font-size: 11px; color: #888; padding: 0 15px 15px; display: block; }
  
  img, iframe { width: 100%; height: auto; display: block; }
  .doc-btn { display: block; margin: 15px; padding: 15px; background: #003366; color: white; text-decoration: none; text-align: center; border-radius: 5px; font-weight: bold; }
  audio { width: 90%; margin: 15px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>SCHOOL UPDATES & EVENTS</h1>
    <p>Taarifa rasmi kutoka Ritaliza Secondary School</p>
  </div>
  
  <div id="updatesArea">
    <p style="text-align:center;">Inapakia taarifa mpya...</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAbUKQSlDIUEOfkE167qfMD52AitPN6XdE",
    authDomain: "rita-upda.firebaseapp.com",
    projectId: "rita-upda",
    storageBucket: "rita-upda.firebasestorage.app",
    messagingSenderId: "364595892983",
    appId: "1:364595892983:web:ea75c75416d68601f5b9f2",
    databaseURL: "https://rita-upda-default-rtdb.firebaseio.com"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuPExvHpu-_FfMHyhHBCuw7oqDQgxq1EqAjL2DwDNSS-6aN1qCJRbor__utTNMplXi/exec";

  async function loadUpdates() {
    const area = document.getElementById("updatesArea");
    area.innerHTML = ""; // Futa meseji ya kupakia

    // 1. CHUKUA DATA KUTOKA FIREBASE (UJUMBE)
    database.ref('updates').limitToLast(10).on('value', (snapshot) => {
      const data = snapshot.val();
      if(data) {
        Object.keys(data).reverse().forEach(key => {
          const item = data[key];
          const div = document.createElement("div");
          div.className = "card news-card";
          div.innerHTML = `<div style="font-size:18px; line-height:1.6;">📢 ${item.message}</div><span class="time">${item.date}</span>`;
          area.prepend(div); // Weka meseji mpya juu
        });
      }
    });

    // 2. CHUKUA DATA KUTOKA GOOGLE SHEET (MEDIA)
    try {
      const response = await fetch(APPS_SCRIPT_URL);
      const mediaData = await response.json();
      
      mediaData.reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        
        if(item.type === 'image') {
          div.innerHTML = `<img src="${item.link}"><div class="caption">${item.cap}</div>`;
        } else if(item.type === 'video') {
          let vidId = item.link.includes("v=") ? item.link.split("v=")[1] : item.link.split("/").pop();
          div.innerHTML = `<iframe height="350" src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe><div class="caption">${item.cap}</div>`;
        } else if(item.type === 'doc') {
          div.innerHTML = `<div class="caption">📄 ${item.cap}</div><a href="${item.link}" class="doc-btn" target="_blank">PAKUA / FUNGUA DOCUMENT</a>`;
        } else if(item.type === 'audio') {
          div.innerHTML = `<div class="caption">🎵 ${item.cap}</div><audio controls><source src="${item.link}" type="audio/mpeg">Sauti haikubaliwi na browser yako.</audio>`;
        }
        
        area.appendChild(div);
      });
    } catch(e) {
      console.log("Sheet data error or empty.");
    }
  }

  window.onload = loadUpdates;
</script>
</body>
</html>
