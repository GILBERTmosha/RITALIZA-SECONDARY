<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Ritaliza Secondary School</title>
<style>
  body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; color: #333; }
  .navbar { background: #003366; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
  .container { max-width: 1000px; margin: 30px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
  @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
  .contact-info, .contact-form { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  h2 { color: #003366; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
  .info-item { margin-bottom: 20px; }
  .info-item strong { display: block; color: #cc0000; }
  input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
  .btn-group { display: flex; gap: 10px; margin-top: 10px; }
  .btn-send { flex: 1; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
  .whatsapp { background: #25D366; }
  .sms { background: #007bff; }
  .call-btn { width: 100%; background: #003366; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; display: block; text-align: center; text-decoration: none; }
</style>
</head>
<body>

<div class="navbar">
  <div style="font-weight: bold;">CONTACT US</div>
</div>

<div class="container">
  <div class="contact-info">
    <h2>Mawasiliano Yetu</h2>
    <div class="info-item">
      <strong>MAHALI / LOCATION:</strong>
      Holili, Kilimanjaro, Tanzania.
    </div>
    <div class="info-item">
      <strong>SIMU / PHONE:</strong>
      0743 640 540
    </div>

    <a href="tel:0743640540" class="call-btn">📞 CALL US NOW</a>

    <div class="info-item" style="margin-top:20px;">
      <strong>UMILIKI / OWNERSHIP:</strong>
      Sisters of St. Joseph of Mombasa
    </div>
  </div>

  <div class="contact-form">
    <h2>Tuma Ujumbe</h2>
    <form id="contactForm">
      <label>Jina Kamili:</label>
      <input type="text" id="userName" placeholder="Andika jina lako..." required>
      <label>Namba ya Simu:</label>
      <input type="tel" id="userPhone" placeholder="Andika namba yako..." required>
      <label>Ujumbe Wako:</label>
      <textarea id="userMessage" rows="4" placeholder="Andika ujumbe wako hapa..." required></textarea>
      
      <div class="btn-group">
        <button type="button" onclick="sendToWhatsApp()" class="btn-send whatsapp">WhatsApp</button>
        <button type="button" onclick="sendToSMS()" class="btn-send sms">SMS</button>
      </div>
    </form>
  </div>
</div>

<script>
function getMessageData() {
    const name = document.getElementById('userName').value;
    const phone = document.getElementById('userPhone').value;
    const msg = document.getElementById('userMessage').value;
    if(!name || !phone || !msg) { alert("Jaza nafasi zote!"); return null; }
    return `Jina: ${name}%0ANamba: ${phone}%0AUjumbe: ${msg}`;
}

function sendToWhatsApp() {
    const data = getMessageData();
    if(data) {
        const adminPhone = "255743640540"; // Namba ya 540
        window.open(`https://wa.me/${adminPhone}?text=${data}`, '_blank');
    }
}

function sendToSMS() {
    const data = getMessageData();
    if(data) {
        const adminPhone = "0743640540"; // Namba ya 540
        const separator = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? "&" : "?";
        window.location.href = `sms:${adminPhone}${separator}body=${data}`;
    }
}
</script>

</body>
</html>
